name: Relay Image Build & Gated Publish

# Internal/testing channel for the relay container image. Pushes to `staging`
# build + publish to GHCR (`:edge` tracks `staging`, plus `:sha-<short>`) — this
# is the image docushark-web's staging deploy pulls. `master` is the OSS /
# production source: PRs into it get a build-check (verify the Dockerfile, no
# publish), and the production image is *promoted* from a tested GHCR digest to
# the production registry on a `relay-v*` tag by a separate release workflow
# (deferred — see Linear "Release Channels & Artifact Promotion").
on:
  push:
    branches: [staging]
    paths:
      - "relay/**"
      - ".github/workflows/relay-image.yml"
  pull_request:
    branches: [master]
    paths:
      - "relay/**"
      - ".github/workflows/relay-image.yml"

env:
  IMAGE: ghcr.io/jpe-net-technologies/docushark-relay
  # Run JS-based actions on Node 24 (Node 20 is being removed from runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=edge,branch=staging
            type=sha,prefix=sha-
          flavor: |
            latest=false

      # Only `staging` pushes publish (internal GHCR image); PRs into master
      # build to verify the Dockerfile without publishing.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: relay
          file: relay/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Only trusted `staging` pushes WRITE the shared build cache. PR
          # build-checks read it but never write, so an untrusted PR can't
          # poison the cache the published `:edge` image is built from (JP-176).
          cache-from: type=gha
          cache-to: ${{ github.event_name == 'push' && 'type=gha,mode=max' || '' }}
